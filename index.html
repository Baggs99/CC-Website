<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="The Yale SOM Consulting Club prepares students for consulting careers through mentorship, casing, recruiting support, and a strong community."
    />
    <meta name="theme-color" content="#0a1a2f" />
    <!-- Avoid stale index.html pointing at old hashed bundles after redeploys -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Yale SOM Consulting Club</title>
    <link
      rel="preload"
      as="image"
      href="/images/yale-som-evans-hall-hero.jpg"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ivory-50 text-navy-900 antialiased">
    <div id="root">
      <!-- Replaced immediately when React mounts; if this stays visible, the JS bundle failed to load -->
      <div
        id="static-boot-fallback"
        style="
          max-width: 36rem;
          margin: 4rem auto;
          padding: 0 1.5rem;
          font-family: Inter, system-ui, sans-serif;
          color: #0a1a2f;
          line-height: 1.6;
        "
      >
        <p style="font-weight: 600; margin-bottom: 0.75rem">
          Loading Yale SOM Consulting Club...
        </p>
        <p style="font-size: 0.9rem; opacity: 0.85">
          If this message does not disappear in a few seconds, the JavaScript
          bundle did not load. Open DevTools, Network tab, and confirm
          <code>/assets/*.js</code> returns 200 (not 404). On Render, set
          Publish directory to <code>dist</code> and clear CDN or browser cache
          after redeploys.
        </p>
      </div>
    </div>
    <noscript>
      <div
        style="
          margin: 4rem auto;
          max-width: 36rem;
          padding: 0 1.5rem;
          font-family: Inter, system-ui, sans-serif;
          color: #0a1a2f;
        "
      >
        This site requires JavaScript. Enable JavaScript to continue.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
